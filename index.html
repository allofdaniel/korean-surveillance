<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="대한감시 (Korean Surveillance) - 저고도 항공감시 시스템" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="대한감시" />

    <title>대한감시 - 저고도 항공감시 시스템</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Mapbox CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Critical viewport CSS — iOS Safari + Android WebView 호환 -->
    <!-- position: fixed 를 html 에 적용하지 않음 (iOS 비표준, 일부 모바일에서 렌더 실패) -->
    <!-- 100dvh (dynamic viewport) 우선 사용, 미지원 시 --app-height JS fallback -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh; /* fallback */
        height: 100dvh; /* iOS 16.4+ / Android Chrome 108+ */
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%; /* iOS 텍스트 자동 확대 차단 */
      }
      body {
        background: #1a1a2e; /* 첫 paint 즉시 배경 표시 — 흰 깜빡임 방지 */
      }
      #root {
        width: 100%;
        height: 100%;
        position: relative;
      }
      /* dvh 미지원 환경에서 JS 가 채우는 fallback */
      @supports not (height: 100dvh) {
        html, body { height: var(--app-height, 100vh); }
      }
    </style>
    <script>
      // Android WebView / 구형 iOS Safari 용 viewport height fallback.
      // dvh 지원 브라우저는 CSS 만으로 동작하므로 이 JS 는 fallback only.
      (function() {
        function setAppHeight() {
          var vh = window.innerHeight;
          if (!vh || vh < 100) return; // 비정상 값 무시
          if (document.documentElement) {
            document.documentElement.style.setProperty('--app-height', vh + 'px');
          }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight, { passive: true });
        window.addEventListener('orientationchange', setAppHeight, { passive: true });
        // iOS Safari 의 address bar 가 collapse 한 후 정확한 높이를 다시 측정
        if ('visualViewport' in window) {
          window.visualViewport.addEventListener('resize', setAppHeight, { passive: true });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration — 새 버전 자동 적용 (모바일 stale cache 방지) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              // 페이지 로드 후 즉시 update 체크
              registration.update();

              // 새 SW 가 설치되면 즉시 활성화
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // 사용자가 다음 navigation 시 새 SW 가 적용되도록 skipWaiting 트리거
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                  });
                }
              });
            })
            .catch(() => { /* registration failed — silent */ });

          // 새 SW 가 controller 가 되면 (skipWaiting 후) 페이지 reload — 모바일에서
          // 옛 bundle 참조하던 stale state 를 한 번에 청소
          let reloading = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloading) return;
            reloading = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
