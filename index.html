<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="대한감시 (Korean Surveillance) - 저고도 항공감시 시스템" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="대한감시" />

    <title>대한감시 - 저고도 항공감시 시스템</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Mapbox CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Critical viewport CSS — 모든 모바일 환경에서 검은 화면 절대 방지 -->
    <!-- 핵심 원칙: width/height 100% + min-height 100vh + 100dvh enhancement -->
    <!-- iOS Safari 14, Android Chrome 100, PWA standalone 모두 height 0 안되게 보장 -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* 무조건 viewport 만큼 보장 — 검은 화면 방지 */
        min-height: 100vh;
        height: 100%;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        background: #1a1a2e; /* 첫 paint 흰 깜빡임 차단 */
      }
      /* dvh 지원 브라우저는 더 정확한 동적 뷰포트 사용 */
      @supports (height: 100dvh) {
        html, body { min-height: 100dvh; height: 100dvh; }
      }
      #root {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
      }
      @supports (height: 100dvh) {
        #root { height: 100dvh; min-height: 100dvh; }
      }
      /* JS fallback (드물지만 dvh+vh 둘 다 0 인 경우 — 옛 Android WebView) */
      html.has-app-height,
      html.has-app-height body,
      html.has-app-height #root {
        height: var(--app-height) !important;
        min-height: var(--app-height) !important;
      }
    </style>
    <script>
      // 모바일 viewport fallback — JS 가 정확한 height 측정해서 CSS var 로 넘김.
      // 정상 브라우저는 CSS 만으로 작동, JS 는 보험.
      (function() {
        function setAppHeight() {
          var vh = window.innerHeight;
          if (!vh || vh < 100) return;
          var d = document.documentElement;
          if (d) {
            d.style.setProperty('--app-height', vh + 'px');
            d.classList.add('has-app-height');
          }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight, { passive: true });
        window.addEventListener('orientationchange', setAppHeight, { passive: true });
        if ('visualViewport' in window) {
          window.visualViewport.addEventListener('resize', setAppHeight, { passive: true });
        }
        // delayed retry — iOS Safari 의 address bar collapse 후 정확한 높이로 갱신
        setTimeout(setAppHeight, 100);
        setTimeout(setAppHeight, 500);
      })();
    </script>
  </head>
  <body>
    <!--
      Pre-mount boot screen — React replaces this DOM when App mounts.
      배경이 검은색만 보이던 모바일 사용자를 위해 즉시 가시 컨텐츠를 제공.
      만약 React 가 8 초 내 mount 안되면 #boot-fallback 의 watchdog 이 진단 패널 표시.
    -->
    <div id="root">
      <div id="boot-screen" style="
        position:fixed;inset:0;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#1a1a2e;color:#7fcfff;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        text-align:center;padding:20px;z-index:1;">
        <div style="font-size:18px;font-weight:600;margin-bottom:8px;letter-spacing:.05em;">대한감시</div>
        <div style="font-size:12px;opacity:.7;margin-bottom:24px;">저고도 항공감시 시스템</div>
        <div style="width:32px;height:32px;border:3px solid rgba(127,207,255,.2);border-top-color:#7fcfff;border-radius:50%;animation:bootSpin 1s linear infinite;"></div>
        <div id="boot-status" style="font-size:11px;opacity:.5;margin-top:16px;min-height:14px;">시스템 초기화 중...</div>
      </div>
      <style>
        @keyframes bootSpin { to { transform: rotate(360deg); } }
      </style>
    </div>

    <!-- Boot watchdog — React 가 20 초 내 mount 못하면 진단 패널 표시 -->
    <script>
      (function() {
        var startedAt = Date.now();
        var statusEl = document.getElementById('boot-status');
        var bootScreen = document.getElementById('boot-screen');

        // 단계별 도달 추적 — 무엇이 fail 했는지 정밀 진단
        // main.tsx → react-render → app-mount 단계마다 stage 갱신.
        // 'inline-script-ran' 만 도달 = ES module 자체가 fetch/parse 실패.
        // 'main-tsx-evaluated' 까지 도달 = main 모듈은 됐지만 createRoot 가 throw.
        // 'react-render-called' 도달 = React render 호출됨, App lazy 미해결.
        // 'app-mounted' 도달 = 정상 동작.
        window.__BOOT_STAGE__ = 'inline-script-ran';
        window.__BOOT_STAGES_LOG__ = [{ stage: 'inline-script-ran', t: 0 }];
        window.__setBootStage__ = function(name) {
          window.__BOOT_STAGE__ = name;
          window.__BOOT_STAGES_LOG__.push({ stage: name, t: Date.now() - startedAt });
        };

        // status 실시간 갱신 — 사용자가 어느 단계에서 멈춰있는지 즉시 봄.
        // 20 초 기다릴 필요 없음. 매 0.5s 단계 + 경과시간 노출.
        var statusTimer = setInterval(function() {
          if (!statusEl || !document.body.contains(statusEl)) {
            clearInterval(statusTimer);
            return;
          }
          var elapsed = Math.round((Date.now() - startedAt) / 100) / 10;
          statusEl.textContent = '단계: ' + window.__BOOT_STAGE__ + ' (' + elapsed + 's)';
        }, 500);

        // 리소스 진단 — 어떤 .js chunk 가 download 됐는지/실패했는지 검사.
        // type=module 자체가 안 돈다면 entries 에 main.tsx 도 안 보인다.
        function getResourceDiagnostics() {
          try {
            if (!performance || !performance.getEntriesByType) return 'performance API unavailable';
            var entries = performance.getEntriesByType('resource');
            var jsEntries = [];
            for (var i = 0; i < entries.length; i++) {
              var name = entries[i].name || '';
              if (/\.(js|tsx|mjs)(\?|$)/.test(name) && name.indexOf(window.location.origin) === 0) {
                var short = name.replace(window.location.origin, '');
                if (short.length > 50) short = '...' + short.substr(short.length - 47);
                jsEntries.push(
                  short + ' [' +
                  (entries[i].duration > 0 ? Math.round(entries[i].duration) + 'ms' : 'pending') +
                  (entries[i].transferSize ? ', ' + Math.round(entries[i].transferSize/1024) + 'KB' : '') +
                  (entries[i].responseStatus ? ', ' + entries[i].responseStatus : '') +
                  ']'
                );
              }
            }
            return jsEntries.length ? jsEntries.join('\n') : '(no JS resources loaded)';
          } catch (e) { return 'error: ' + (e && e.message); }
        }

        // 20 초 후에도 #boot-screen 이 살아있으면 React mount 실패 — 진단 패널 표시.
        setTimeout(function() {
          if (!bootScreen || !document.body.contains(bootScreen)) return; // React mounted OK
          clearInterval(statusTimer);

          var ua = navigator.userAgent || 'unknown';
          var hasWebGL = (function(){
            try {
              var c = document.createElement('canvas');
              return !!(c.getContext('webgl2') || c.getContext('webgl') || c.getContext('experimental-webgl'));
            } catch (e) { return false; }
          })();
          var bootError = window.__BOOT_ERROR__ || null;
          var stage = window.__BOOT_STAGE__ || 'unknown';
          var stagesLog = (window.__BOOT_STAGES_LOG__ || [])
            .map(function(s){ return s.stage + '@' + s.t + 'ms'; }).join(' → ');
          var resourceDiag = getResourceDiagnostics();

          bootScreen.innerHTML =
            '<div style="max-width:560px;width:100%;text-align:left;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',Roboto,sans-serif;">' +
              '<div style="color:#ff6b6b;font-size:16px;font-weight:600;margin-bottom:12px;">앱 시작에 실패했습니다</div>' +
              '<div style="color:#cfd6e0;font-size:12px;line-height:1.6;margin-bottom:16px;opacity:.85;">20초 내에 화면이 준비되지 않았습니다. 아래 정보를 개발자에게 전달하면 빠르게 원인을 파악할 수 있습니다.</div>' +
              '<div style="background:rgba(0,0,0,.35);border:1px solid rgba(127,207,255,.15);border-radius:6px;padding:12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;color:#9fb3c8;white-space:pre-wrap;word-break:break-all;line-height:1.5;">' +
                'time:     ' + new Date().toISOString() + '\n' +
                'elapsed:  ' + (Date.now() - startedAt) + ' ms\n' +
                'last-stage: ' + stage + '\n' +
                'stages:   ' + (stagesLog || '(none)') + '\n' +
                'ua:       ' + ua + '\n' +
                'webgl:    ' + (hasWebGL ? 'available' : 'NOT available') + '\n' +
                'pixels:   ' + window.innerWidth + 'x' + window.innerHeight + ' (dpr ' + (window.devicePixelRatio || 1) + ')\n' +
                'online:   ' + (navigator.onLine ? 'yes' : 'no') + '\n' +
                'sw:       ' + (('serviceWorker' in navigator) ? 'supported' : 'unsupported') + '\n' +
                (bootError ? 'error:    ' + bootError : 'error:    (none captured)') + '\n' +
                '\n--- JS resources ---\n' + resourceDiag +
              '</div>' +
              '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">' +
                '<button id="boot-debug-btn" style="flex:1;min-width:120px;padding:10px;background:#7fcfff;color:#0e1117;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">디버그 콘솔 열기</button>' +
                '<button id="boot-reset-btn" style="flex:1;min-width:120px;padding:10px;background:transparent;color:#7fcfff;border:1px solid #7fcfff;border-radius:4px;font-size:13px;cursor:pointer;">캐시 초기화 후 재시도</button>' +
              '</div>' +
            '</div>';

          var debugBtn = document.getElementById('boot-debug-btn');
          var resetBtn = document.getElementById('boot-reset-btn');
          if (debugBtn) debugBtn.addEventListener('click', function() {
            // Eruda mobile devtools — CDN 에서 로드해 console/network 검사 가능
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/eruda';
            s.onload = function() {
              try {
                /* global eruda */
                window.eruda && window.eruda.init();
                debugBtn.textContent = '디버그 콘솔 활성화됨';
                debugBtn.disabled = true;
                debugBtn.style.opacity = '.6';
              } catch (e) {
                debugBtn.textContent = '콘솔 로드 실패: ' + (e && e.message);
              }
            };
            s.onerror = function() {
              debugBtn.textContent = '콘솔 CDN 접근 실패 (네트워크?)';
            };
            document.body.appendChild(s);
          });
          if (resetBtn) resetBtn.addEventListener('click', function() {
            window.location.replace('/?reset=' + Date.now());
          });
        }, 20000);

        // 모듈 평가 단계 throw 캡처 — 핵심: capture phase 로 document 에 등록.
        // <script> element 의 error event 는 bubbling 안 하므로 window 의 일반
        // listener 는 못 잡음. document + useCapture=true 로만 캡처 가능.
        function captureBootError(label, msg) {
          if (window.__BOOT_ERROR__) return; // first error wins
          window.__BOOT_ERROR__ = label + ': ' + msg;
        }
        // window 의 일반 (bubbling) error — runtime exception 잡음
        window.addEventListener('error', function(ev) {
          captureBootError('runtime',
            (ev.message || 'unknown') +
            (ev.filename ? ' @ ' + ev.filename + ':' + (ev.lineno||'?') : ''));
        }, false);
        // document 의 capture phase — script/img/link 등 resource error 잡음.
        // ES module evaluation error 가 여기에 노출되는 케이스가 핵심.
        document.addEventListener('error', function(ev) {
          var t = ev.target;
          if (!t) return;
          var tag = t.tagName ? t.tagName.toLowerCase() : 'unknown';
          var src = t.src || t.href || '';
          captureBootError('resource-' + tag,
            (src ? src.split('/').pop() + ' ' : '') +
            'failed to load/parse');
        }, true /* useCapture */);
        // promise rejection (lazy import 실패 등)
        window.addEventListener('unhandledrejection', function(ev) {
          var r = ev && ev.reason;
          captureBootError('promise',
            (r && (r.message || r.toString())) || 'unknown');
        }, false);
      })();
    </script>

    <!-- ?debug=1 즉시 Eruda 활성화 — 디버그 패널 기다릴 필요 없이 바로 콘솔 확인 -->
    <script>
      if (/[?&]debug=1\b/.test(window.location.search)) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = function() { try { window.eruda && window.eruda.init(); } catch(e){} };
        document.head.appendChild(s);
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>

    <!--
      Module script watcher — main.tsx 의 <script type=module> tag 에 직접
      error listener 부착. Vite 가 build 시 위 script 태그를 변환해 실제
      bundle 을 src 로 가리킴. 평가 실패 시 그 element 에 error 이벤트 발생.
      위의 document capture listener 와 별도로, element 에 직접 부착해서
      놓치지 않게 한다.
    -->
    <script>
      (function() {
        // build 후 실제 module script 들을 찾아 error 핸들러 부착
        function attachToModuleScripts() {
          var scripts = document.querySelectorAll('script[type="module"]');
          for (var i = 0; i < scripts.length; i++) {
            (function(s) {
              s.addEventListener('error', function(ev) {
                if (window.__BOOT_ERROR__) return;
                window.__BOOT_ERROR__ =
                  'module-script-error: ' +
                  (s.src ? s.src.split('/').pop() : 'inline') +
                  ' ' + ((ev && ev.message) || 'evaluation/parse failed');
              });
            })(scripts[i]);
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', attachToModuleScripts);
        } else {
          attachToModuleScripts();
        }
      })();
    </script>

    <!-- Emergency reset — ?reset=1 접속 시 모든 SW unregister + cache 삭제 후 다시 로드 -->
    <!-- 모바일 사용자가 옛 SW (v6/v7) 에 stuck 일 때 escape hatch -->
    <script>
      (function() {
        var search = window.location.search || '';
        if (search.indexOf('reset') === -1) return;
        if (!('serviceWorker' in navigator)) {
          window.location.replace('/');
          return;
        }
        // CRITICAL: closing body tag 를 string 에 쓰지 말 것. vite-plugin-legacy 가
        // HTML 의 closing body 직전에 nomodule script 를 inject 하는데, source 의
        // string literal 안의 같은 tag 도 매칭해서 script 들을 끼워넣어 syntax
        // error 가 발생함. document.body.innerHTML 로 우회.
        document.body.style.cssText = 'background:#1a1a2e;color:#7fcfff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:20px;';
        document.body.innerHTML =
          '<div><div style="font-size:14px;opacity:.8;margin-bottom:8px;">Resetting cache...</div>' +
          '<div style="font-size:11px;opacity:.5;">캐시 초기화 중 — 잠시 후 자동 새로고침</div></div>';
        Promise.all([
          navigator.serviceWorker.getRegistrations()
            .then(function(regs) { return Promise.all(regs.map(function(r) { return r.unregister(); })); })
            .catch(function() {}),
          ('caches' in window ? caches.keys()
            .then(function(keys) { return Promise.all(keys.map(function(k) { return caches.delete(k); })); })
            .catch(function() {}) : Promise.resolve())
        ]).finally(function() {
          // sessionStorage / localStorage 도 정리 — 옛 reload-at 값 등
          try { sessionStorage.clear(); } catch (e) {}
          // 새 페이지 시작
          setTimeout(function() { window.location.replace('/'); }, 500);
        });
        // SW 등록 흐름 진입 차단
        window.__SKIP_SW__ = true;
      })();
    </script>

    <!-- Service Worker Registration — 새 버전 자동 적용 (모바일 stale cache 방지) -->
    <script>
      if (window.__SKIP_SW__) { /* reset mode — 등록 skip */ }
      else if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              // 페이지 로드 후 즉시 update 체크
              registration.update();

              // 새 SW 가 설치되면 즉시 활성화
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // 사용자가 다음 navigation 시 새 SW 가 적용되도록 skipWaiting 트리거
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                  });
                }
              });
            })
            .catch(() => { /* registration failed — silent */ });

          // 새 SW 가 controller 가 되면 페이지 reload — 옛 bundle 참조하던 stale state 청소.
          // 단, 무한 reload 루프 방지: localStorage 에 마지막 reload 시각 저장,
          // 5초 안에 controllerchange 가 두 번 일어나면 두 번째는 skip (새 deploy 가
          // 매우 빠르게 연속 발생하는 경우 모바일 사용자가 반복 reload 에 갇히는 것 차단).
          let reloading = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloading) return;
            try {
              const lastReload = parseInt(sessionStorage.getItem('sw-reload-at') || '0', 10);
              if (Date.now() - lastReload < 5000) return; // recent reload — skip
              sessionStorage.setItem('sw-reload-at', String(Date.now()));
            } catch (e) { /* sessionStorage may fail in private mode — proceed */ }
            reloading = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
