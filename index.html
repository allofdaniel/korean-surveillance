<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="대한감시 (Korean Surveillance) - 저고도 항공감시 시스템" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="대한감시" />

    <title>대한감시 - 저고도 항공감시 시스템</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Mapbox CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Critical viewport CSS — 모든 모바일 환경에서 검은 화면 절대 방지 -->
    <!-- 핵심 원칙: width/height 100% + min-height 100vh + 100dvh enhancement -->
    <!-- iOS Safari 14, Android Chrome 100, PWA standalone 모두 height 0 안되게 보장 -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* 무조건 viewport 만큼 보장 — 검은 화면 방지 */
        min-height: 100vh;
        height: 100%;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
        -webkit-text-size-adjust: 100%;
        background: #1a1a2e; /* 첫 paint 흰 깜빡임 차단 */
      }
      /* dvh 지원 브라우저는 더 정확한 동적 뷰포트 사용 */
      @supports (height: 100dvh) {
        html, body { min-height: 100dvh; height: 100dvh; }
      }
      #root {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
      }
      @supports (height: 100dvh) {
        #root { height: 100dvh; min-height: 100dvh; }
      }
      /* JS fallback (드물지만 dvh+vh 둘 다 0 인 경우 — 옛 Android WebView) */
      html.has-app-height,
      html.has-app-height body,
      html.has-app-height #root {
        height: var(--app-height) !important;
        min-height: var(--app-height) !important;
      }
    </style>
    <script>
      // 모바일 viewport fallback — JS 가 정확한 height 측정해서 CSS var 로 넘김.
      // 정상 브라우저는 CSS 만으로 작동, JS 는 보험.
      (function() {
        function setAppHeight() {
          var vh = window.innerHeight;
          if (!vh || vh < 100) return;
          var d = document.documentElement;
          if (d) {
            d.style.setProperty('--app-height', vh + 'px');
            d.classList.add('has-app-height');
          }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight, { passive: true });
        window.addEventListener('orientationchange', setAppHeight, { passive: true });
        if ('visualViewport' in window) {
          window.visualViewport.addEventListener('resize', setAppHeight, { passive: true });
        }
        // delayed retry — iOS Safari 의 address bar collapse 후 정확한 높이로 갱신
        setTimeout(setAppHeight, 100);
        setTimeout(setAppHeight, 500);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Emergency reset — ?reset=1 접속 시 모든 SW unregister + cache 삭제 후 다시 로드 -->
    <!-- 모바일 사용자가 옛 SW (v6/v7) 에 stuck 일 때 escape hatch -->
    <script>
      (function() {
        var search = window.location.search || '';
        if (search.indexOf('reset') === -1) return;
        if (!('serviceWorker' in navigator)) {
          window.location.replace('/');
          return;
        }
        document.documentElement.innerHTML =
          '<body style="background:#1a1a2e;color:#7fcfff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:20px;">' +
          '<div><div style="font-size:14px;opacity:.8;margin-bottom:8px;">Resetting cache...</div>' +
          '<div style="font-size:11px;opacity:.5;">캐시 초기화 중 — 잠시 후 자동 새로고침</div></div></body>';
        Promise.all([
          navigator.serviceWorker.getRegistrations()
            .then(function(regs) { return Promise.all(regs.map(function(r) { return r.unregister(); })); })
            .catch(function() {}),
          ('caches' in window ? caches.keys()
            .then(function(keys) { return Promise.all(keys.map(function(k) { return caches.delete(k); })); })
            .catch(function() {}) : Promise.resolve())
        ]).finally(function() {
          // sessionStorage / localStorage 도 정리 — 옛 reload-at 값 등
          try { sessionStorage.clear(); } catch (e) {}
          // 새 페이지 시작
          setTimeout(function() { window.location.replace('/'); }, 500);
        });
        // SW 등록 흐름 진입 차단
        window.__SKIP_SW__ = true;
      })();
    </script>

    <!-- Service Worker Registration — 새 버전 자동 적용 (모바일 stale cache 방지) -->
    <script>
      if (window.__SKIP_SW__) { /* reset mode — 등록 skip */ }
      else if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              // 페이지 로드 후 즉시 update 체크
              registration.update();

              // 새 SW 가 설치되면 즉시 활성화
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // 사용자가 다음 navigation 시 새 SW 가 적용되도록 skipWaiting 트리거
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                  });
                }
              });
            })
            .catch(() => { /* registration failed — silent */ });

          // 새 SW 가 controller 가 되면 페이지 reload — 옛 bundle 참조하던 stale state 청소.
          // 단, 무한 reload 루프 방지: localStorage 에 마지막 reload 시각 저장,
          // 5초 안에 controllerchange 가 두 번 일어나면 두 번째는 skip (새 deploy 가
          // 매우 빠르게 연속 발생하는 경우 모바일 사용자가 반복 reload 에 갇히는 것 차단).
          let reloading = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloading) return;
            try {
              const lastReload = parseInt(sessionStorage.getItem('sw-reload-at') || '0', 10);
              if (Date.now() - lastReload < 5000) return; // recent reload — skip
              sessionStorage.setItem('sw-reload-at', String(Date.now()));
            } catch (e) { /* sessionStorage may fail in private mode — proceed */ }
            reloading = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
