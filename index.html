<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0077be" />
    <meta name="description" content="대한감시 (Korean Surveillance) - 저고도 항공감시 시스템" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="대한감시" />

    <title>대한감시 - 저고도 항공감시 시스템</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />

    <!-- Mapbox CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet" />

    <!-- tbas.vercel.app 가 정상 동작하는 환경에서 우리만 fail 한 패턴은 inline
         script 개수가 너무 많은 것이 원인. tbas 와 동일하게 viewport setup +
         SW register 만 inline 으로 두고 진단 코드는 모두 제거. -->
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #1a1a2e;
      }
    </style>
    <script>
      // Force full height on Android WebView (tbas 와 동일 패턴)
      (function() {
        function setAppHeight() {
          var vh = window.innerHeight;
          if (document.documentElement) {
            document.documentElement.style.setProperty('--app-height', vh + 'px');
            document.documentElement.style.height = vh + 'px';
          }
          if (document.body) {
            document.body.style.height = vh + 'px';
          }
          var root = document.getElementById('root');
          if (root) root.style.height = vh + 'px';
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', setAppHeight);
        window.addEventListener('load', setAppHeight);
        setTimeout(setAppHeight, 100);
        setTimeout(setAppHeight, 300);
        setTimeout(setAppHeight, 500);
        setTimeout(setAppHeight, 1000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      SW kill — 옛 SW (v6~v13) 가 stale HTML/chunk cache 응답으로 검은 화면
      유발 진단됨. v14 kill-switch SW 도 install + activate 후에야 unregister.
      사용자가 검은 화면 보고 닫으면 activate 못 함 → 영구 stuck.
      해결: 즉시 모든 SW unregister + 모든 cache 삭제. SW register 안 함.
    -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          try {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              for (var i = 0; i < regs.length; i++) {
                try { regs[i].unregister(); } catch (e) {}
              }
            }).catch(function() {});
          } catch (e) {}
        }
        if ('caches' in window) {
          try {
            caches.keys().then(function(keys) {
              for (var i = 0; i < keys.length; i++) {
                try { caches.delete(keys[i]); } catch (e) {}
              }
            }).catch(function() {});
          } catch (e) {}
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
